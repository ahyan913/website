<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lui Ting Yan | Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"  />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <header class="sticky-top">
    <nav class="navbar navbar-expand-md" aria-label="Primary site navigation">
      <div class="container">
        <a class="navbar-brand brand" href="#">Lui Ting Yan</a>
        <div class="d-flex align-items-center gap-2 ms-auto">
         
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobile-menu" aria-controls="mobile-menu" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"><i class="fa-solid fa-moon"></i></button>
        </div>
        <div class="collapse navbar-collapse justify-content-end" id="mobile-menu">
          <ul class="navbar-nav align-items-md-center">
            <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
          </ul>
        </div>
         
      </div>
    </nav>
  </header>

  <main id="content-root">
    <div id="hero-section"></div>
    <div id="about-section"></div>
    <div id="skills-section"></div>
    <div id="contact-section"></div>
  </main>

  <footer>
    <p id="copyright-text">© <span id="current-year"></span> Lui Ting Yan. Built with a clean responsive layout.</p>
  </footer>

  
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const currentYear = document.getElementById('current-year');
    const currentTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', currentTheme);
    currentYear.textContent = new Date().getFullYear();
    const setToggleIcon = theme => {
      themeToggle.innerHTML = theme === 'dark'
        ? '<i class="fa-solid fa-sun"></i>'
        : '<i class="fa-solid fa-moon"></i>';
    };

    setToggleIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      const nextTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', nextTheme);
      localStorage.setItem('theme', nextTheme);
      setToggleIcon(nextTheme);
    });

    const loadSection = (containerId, fileName) => {
      const $container = $(`#${containerId}`);
      if (!$container.length) return;
      $.ajax({
        url: `./static/${fileName}`,
        dataType: 'html'
      }).done(html => {
        $container.html(html);
      });
    };

    $(function() {
      loadSection('hero-section', 'hero.html');
      loadSection('about-section', 'about.html');
      loadSection('skills-section', 'skills.html');
      loadSection('contact-section', 'contact.html');
    });
  </script>
</body>
</html>
